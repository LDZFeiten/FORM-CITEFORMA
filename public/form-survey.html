<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <title>Microsoft Internal RSVP</title>
</head>
<body>
  <form name="microsoft-internal-rsvp" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="microsoft-internal-rsvp" />
    <input type="text" name="presence" />
    <input type="text" name="guest" />
    <input type="text" name="dietary_restrictions" />
    <input type="text" name="employee_first_name" />
    <input type="text" name="employee_last_name" />
    <input type="text" name="employee_name" />
    <input type="text" name="employee_role" />
    <input type="text" name="employee_department" />
    <input type="email" name="employee_email" />
    <input type="tel" name="employee_phone" />
    <input type="text" name="employee_city" />
    <input type="text" name="guest_name" />
    <input type="email" name="guest_email" />
    <input type="tel" name="guest_phone" />
    <input type="text" name="guest_relationship" />
    <textarea name="dietary_details"></textarea>
    <input name="bot-field" />
  </form>
</body>
</html>
